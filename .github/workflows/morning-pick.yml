name: Morning Stock Pick

on:
  schedule:
    - cron: "30 0 * * 1-5"
  workflow_dispatch:

jobs:
  pick:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Debug info
        run: |
          echo "=== Python version ==="
          python --version
          echo "=== Installed packages ==="
          pip list 2>&1 | head -20
      - name: Daily scalping and swing
        env:
          DEEPSEEK_API_KEY: "${{ secrets.DEEPSEEK_API_KEY }}"
          AI_PROVIDER: deepseek
          WECOM_WEBHOOK: "${{ secrets.WECOM_WEBHOOK }}"
        run: python -u src/main.py --mode daily
      - name: Value Monday only
        env:
          DEEPSEEK_API_KEY: "${{ secrets.DEEPSEEK_API_KEY }}"
          AI_PROVIDER: deepseek
          WECOM_WEBHOOK: "${{ secrets.WECOM_WEBHOOK }}"
        run: python -u src/main.py --mode value
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morning-reports
          path: output/
          retention-days: 7
