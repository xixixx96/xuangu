name: 早盘选股推送

on:
  # 定时：北京时间每个交易日上午 8:30（UTC 0:30）
  schedule:
    - cron: "30 0 * * 1-5"

  # 允许手动触发
  workflow_dispatch:

jobs:
  morning-pick:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Daily scalping and swing
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AI_PROVIDER: deepseek
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
        run: python src/main.py --mode daily

      - name: Value strategy Monday only
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AI_PROVIDER: deepseek
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
        run: python src/main.py --mode value

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morning-reports
          path: output/
          retention-days: 7
