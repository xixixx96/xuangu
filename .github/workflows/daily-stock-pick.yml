name: 每日选股推送

on:
  # 定时触发：北京时间每个交易日上午 8:30（UTC 0:30）和下午 14:00（UTC 6:00）
  schedule:
    # 早盘：短线 + 波段 + 价值（周一至周五 8:30）
    - cron: "30 0 * * 1-5"
    # 午盘：短线更新 + 波段更新（周一至周五 14:00）
    - cron: "0 6 * * 1-5"

  # 允许手动触发
  workflow_dispatch:
    inputs:
      mode:
        description: "运行模式"
        required: false
        default: "daily"
        type: choice
        options:
          - daily
          - value
          - all
          - afternoon

jobs:
  stock-pick:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ==================== 早盘（8:30） ====================

      - name: [早盘] 短线 + 波段
        if: ${{ github.event.schedule == '30 0 * * 1-5' || github.event.inputs.mode == 'daily' }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AI_PROVIDER: deepseek
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
        run: python src/main.py --mode daily

      - name: [早盘] 价值策略（周一）
        if: ${{ github.event.schedule == '30 0 * * 1-5' || github.event.inputs.mode == 'value' }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AI_PROVIDER: deepseek
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
        run: python src/main.py --mode value

      # ==================== 午盘（14:00） ====================

      - name: [午盘] 短线 + 波段更新
        if: ${{ github.event.schedule == '0 6 * * 1-5' || github.event.inputs.mode == 'afternoon' }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AI_PROVIDER: deepseek
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
        run: python src/main.py --mode afternoon

      # ==================== 手动：全部 ====================

      - name: [手动] 全部三种策略
        if: ${{ github.event.inputs.mode == 'all' }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AI_PROVIDER: deepseek
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
        run: python src/main.py --mode all

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stock-reports
          path: output/
          retention-days: 7
