name: 午盘选股推送

on:
  # 定时触发：北京时间每个交易日下午 14:00（UTC 6:00）
  schedule:
    - cron: "0 6 * * 1-5"

  # 允许手动触发
  workflow_dispatch:

jobs:
  afternoon-pick:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: [午盘] 短线 + 波段更新
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AI_PROVIDER: deepseek
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
        run: python src/main.py --mode afternoon

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: afternoon-reports
          path: output/
          retention-days: 7
