name: Afternoon Stock Pick

on:
  schedule:
    - cron: "0 6 * * 1-5"
  workflow_dispatch:

jobs:
  pick:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Afternoon scalping and swing update
        env:
          DEEPSEEK_API_KEY: "${{ secrets.DEEPSEEK_API_KEY }}"
          AI_PROVIDER: deepseek
          WECOM_WEBHOOK: "${{ secrets.WECOM_WEBHOOK }}"
        run: python src/main.py --mode afternoon
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: afternoon-reports
          path: output/
          retention-days: 7
